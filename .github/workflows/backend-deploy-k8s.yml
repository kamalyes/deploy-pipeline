name: ☸️ Deploy to Kubernetes

on:
  workflow_call:
    inputs:
      # ============================================
      # 动态值（每次调用不同，必须传入）
      # ============================================
      environment:
        description: 'Deployment environment (dev/test/prod)'
        required: true
        type: string
      image-name:
        description: 'Complete Docker image name with tag'
        required: true
        type: string
      binary-name:
        description: 'Binary/Service name'
        required: true
        type: string
      binary-source-dir:
        description: 'Binary source directory (also used as deployments output dir)'
        required: true
        type: string
      # ============================================
      # 可覆盖的静态配置（优先读 vars，有硬编码默认值兜底）
      # ============================================
      namespace:
        description: 'Kubernetes namespace (overrides vars.K8S_NAMESPACE)'
        required: false
        type: string
        default: ''
      http-port:
        description: 'HTTP port (overrides vars.HTTP_PORT)'
        required: false
        type: string
        default: ''
      rpc-port:
        description: 'RPC port (overrides vars.RPC_PORT)'
        required: false
        type: string
        default: ''
      pprof-port:
        description: 'Pprof port (overrides vars.PPROF_PORT)'
        required: false
        type: string
        default: ''
      config-yaml:
        description: 'Configuration YAML file path'
        required: false
        type: string
        default: ''
      configmap-name:
        description: 'ConfigMap name'
        required: false
        type: string
        default: ''
      docker-workdir:
        description: 'Docker working directory (overrides vars.DOCKER_RUN_WORKDIR)'
        required: false
        type: string
        default: ''
      image-pull-secrets:
        description: 'Image pull secrets name (overrides vars.K8S_IMAGE_PULL_SECRETS)'
        required: false
        type: string
        default: ''
      readiness-delay-seconds:
        description: 'Readiness probe initial delay seconds (overrides vars.K8S_READINESS_DELAY_SECONDS)'
        required: false
        type: string
        default: ''
      readiness-period-seconds:
        description: 'Readiness probe period seconds (overrides vars.K8S_READINESS_PERIOD_SECONDS)'
        required: false
        type: string
        default: ''
      liveness-delay-seconds:
        description: 'Liveness probe initial delay seconds (overrides vars.K8S_LIVENESS_DELAY_SECONDS)'
        required: false
        type: string
        default: ''
      liveness-period-seconds:
        description: 'Liveness probe period seconds (overrides vars.K8S_LIVENESS_PERIOD_SECONDS)'
        required: false
        type: string
        default: ''
      cpu-request:
        description: 'CPU request (overrides vars.K8S_CPU_REQUEST)'
        required: false
        type: string
        default: ''
      memory-request:
        description: 'Memory request (overrides vars.K8S_MEMORY_REQUEST)'
        required: false
        type: string
        default: ''
      cpu-limit:
        description: 'CPU limit (overrides vars.K8S_CPU_LIMIT)'
        required: false
        type: string
        default: ''
      memory-limit:
        description: 'Memory limit (overrides vars.K8S_MEMORY_LIMIT)'
        required: false
        type: string
        default: ''
      min-replicas:
        description: 'Minimum replicas count (overrides vars.K8S_MIN_REPLICAS)'
        required: false
        type: string
        default: ''
      max-replicas:
        description: 'Maximum replicas count (overrides vars.K8S_MAX_REPLICAS)'
        required: false
        type: string
        default: ''
      deployment-replicas:
        description: 'Deployment replicas count (overrides vars.K8S_DEPLOYMENT_REPLICAS)'
        required: false
        type: string
        default: ''
      target-cpu-utilization:
        description: 'Target CPU utilization percentage (overrides vars.K8S_TARGET_CPU_UTILIZATION)'
        required: false
        type: string
        default: ''
      target-memory-utilization:
        description: 'Target memory utilization percentage (overrides vars.K8S_TARGET_MEMORY_UTILIZATION)'
        required: false
        type: string
        default: ''
      scale-up-percent:
        description: 'Scale up maximum percentage (overrides vars.K8S_SCALE_UP_PERCENT)'
        required: false
        type: string
        default: ''
      scale-down-percent:
        description: 'Scale down maximum percentage (overrides vars.K8S_SCALE_DOWN_PERCENT)'
        required: false
        type: string
        default: ''
      scale-down-stabilization-seconds:
        description: 'Scale down stabilization window in seconds (overrides vars.K8S_SCALE_DOWN_STABILIZATION_SECONDS)'
        required: false
        type: string
        default: ''
      enable-hpa:
        description: 'Enable HPA (overrides vars.K8S_ENABLE_HPA)'
        required: false
        type: string
        default: ''
      ingress-path-prefix:
        description: 'Ingress path prefix (empty to skip Ingress)'
        required: false
        type: string
        default: ''
      ingress-entry-point:
        description: 'Ingress entry point (overrides vars.INGRESS_ENTRY_POINT)'
        required: false
        type: string
        default: ''
      ingress-tls:
        description: 'Enable TLS for IngressRoute (overrides vars.INGRESS_TLS, requires Traefik ACME certResolver)'
        required: false
        type: string
        default: ''
      ingress-cert-resolver:
        description: 'Traefik ACME certResolver name (overrides vars.INGRESS_CERT_RESOLVER, e.g. letsencrypt)'
        required: false
        type: string
        default: ''
      ingress-tls-entry-point:
        description: 'TLS entry point (overrides vars.INGRESS_TLS_ENTRY_POINT)'
        required: false
        type: string
        default: ''
      notification-provider:
        description: 'Notification provider (none/feishu/telegram/all)'
        required: false
        type: string
        default: 'none'

    secrets:
      KUBECONFIG:
        description: 'Kubernetes kubeconfig 内容'
        required: true
      FEISHU_WEBHOOK_URL:
        description: '飞书通知 Webhook URL'
        required: false
      TELEGRAM_BOT_TOKEN:
        description: 'Telegram 通知 Bot Token'
        required: false
      TELEGRAM_CHAT_ID:
        description: 'Telegram 通知 Chat ID'
        required: false

jobs:
  deploy:
    name: ☸️ Deploy to K8s
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image-name: ${{ steps.image-name.outputs.image-name }}
    env:
      KUBECONFIG: ${{ secrets.KUBECONFIG }}
      # 优先级: input > vars > 硬编码默认值
      NAMESPACE: ${{ inputs.namespace || vars.K8S_NAMESPACE || 'default' }}
      HTTP_PORT: ${{ inputs.http-port || vars.HTTP_PORT || '8182' }}
      RPC_PORT: ${{ inputs.rpc-port || vars.RPC_PORT || '9181' }}
      PPROF_PORT: ${{ inputs.pprof-port || vars.PPROF_PORT || '6160' }}
      DOCKER_RUN_WORKDIR: ${{ inputs.docker-workdir || vars.DOCKER_RUN_WORKDIR || format('/usr/local/services/{0}', github.event.repository.name) }}
      IMAGE_PULL_SECRETS: ${{ inputs.image-pull-secrets || vars.K8S_IMAGE_PULL_SECRETS || 'ghcr.io' }}
      READINESS_DELAY: ${{ inputs.readiness-delay-seconds || vars.K8S_READINESS_DELAY_SECONDS || '5' }}
      READINESS_PERIOD: ${{ inputs.readiness-period-seconds || vars.K8S_READINESS_PERIOD_SECONDS || '10' }}
      LIVENESS_DELAY: ${{ inputs.liveness-delay-seconds || vars.K8S_LIVENESS_DELAY_SECONDS || '15' }}
      LIVENESS_PERIOD: ${{ inputs.liveness-period-seconds || vars.K8S_LIVENESS_PERIOD_SECONDS || '20' }}
      CPU_REQUEST: ${{ inputs.cpu-request || vars.K8S_CPU_REQUEST || '100m' }}
      MEMORY_REQUEST: ${{ inputs.memory-request || vars.K8S_MEMORY_REQUEST || '128Mi' }}
      CPU_LIMIT: ${{ inputs.cpu-limit || vars.K8S_CPU_LIMIT || '300m' }}
      MEMORY_LIMIT: ${{ inputs.memory-limit || vars.K8S_MEMORY_LIMIT || '256Mi' }}
      MIN_REPLICAS: ${{ inputs.min-replicas || vars.K8S_MIN_REPLICAS || '2' }}
      MAX_REPLICAS: ${{ inputs.max-replicas || vars.K8S_MAX_REPLICAS || '10' }}
      DEPLOYMENT_REPLICAS: ${{ inputs.deployment-replicas || vars.K8S_DEPLOYMENT_REPLICAS || '2' }}
      TARGET_CPU_UTILIZATION: ${{ inputs.target-cpu-utilization || vars.K8S_TARGET_CPU_UTILIZATION || '80' }}
      TARGET_MEMORY_UTILIZATION: ${{ inputs.target-memory-utilization || vars.K8S_TARGET_MEMORY_UTILIZATION || '80' }}
      SCALE_UP_PERCENT: ${{ inputs.scale-up-percent || vars.K8S_SCALE_UP_PERCENT || '100' }}
      SCALE_DOWN_PERCENT: ${{ inputs.scale-down-percent || vars.K8S_SCALE_DOWN_PERCENT || '50' }}
      SCALE_DOWN_STABILIZATION_SECONDS: ${{ inputs.scale-down-stabilization-seconds || vars.K8S_SCALE_DOWN_STABILIZATION_SECONDS || '300' }}
      ENABLE_HPA: ${{ inputs.enable-hpa || vars.K8S_ENABLE_HPA || 'true' }}
      INGRESS_ENTRY_POINT: ${{ inputs.ingress-entry-point || vars.INGRESS_ENTRY_POINT || 'web' }}
      INGRESS_TLS: ${{ inputs.ingress-tls || vars.INGRESS_TLS || 'false' }}
      INGRESS_CERT_RESOLVER: ${{ inputs.ingress-cert-resolver || vars.INGRESS_CERT_RESOLVER || 'letsencrypt' }}
      INGRESS_TLS_ENTRY_POINT: ${{ inputs.ingress-tls-entry-point || vars.INGRESS_TLS_ENTRY_POINT || 'websecure' }}

    steps:
      - name: Normalize Docker Image Name
        id: image-name
        uses: kamalyes/deploy-pipeline/.github/actions/normalize-image-name@master
        with:
          image-name: ${{ inputs.image-name }}

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6

      - name: Debug KUBECONFIG
        run: |
          if [ -z "$KUBECONFIG" ]; then
            echo "ERROR: KUBECONFIG is empty! Check your environment secrets."
            exit 1
          else
            echo "KUBECONFIG is set (length: ${#KUBECONFIG})"
          fi
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

      - name: ⚙️ Setup Kubernetes Context
        uses: Azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ env.KUBECONFIG }}

      - name: 📥 Checkout Deploy Workflows (for templates)
        uses: actions/checkout@v6
        with:
          repository: kamalyes/deploy-pipeline
          ref: master
          path: _deploy-workflows

      - name: 📝 Generate K8s Manifests
        run: |
          echo "Generating Kubernetes manifests for: ${{ inputs.binary-name }}"
          echo "  Namespace: ${{ env.NAMESPACE }}"
          echo "  Image: ${{ steps.image-name.outputs.image-name }}"
          echo "  HTTP: ${{ env.HTTP_PORT }}, RPC: ${{ env.RPC_PORT }}, PProf: ${{ env.PPROF_PORT }}"

          DEPLOY_DIR="${{ inputs.binary-source-dir }}"
          mkdir -p "${DEPLOY_DIR}"

          export APP_NAME="${{ inputs.binary-name }}"
          export NAMESPACE="${{ env.NAMESPACE }}"
          export IMAGE_NAME="${{ steps.image-name.outputs.image-name }}"
          export HTTP_PORT="${{ env.HTTP_PORT }}"
          export RPC_PORT="${{ env.RPC_PORT }}"
          export PPROF_PORT="${{ env.PPROF_PORT }}"

          # RPC 端口可选：gateway 类服务无 gRPC 端口，设为空/0/none 则跳过
          if [ -n "${{ env.RPC_PORT }}" ] && [ "${{ env.RPC_PORT }}" != "0" ] && [ "${{ env.RPC_PORT }}" != "none" ]; then
            export DEPLOY_RPC_PORT_BLOCK=$(printf '        - name: rpc\n          containerPort: %s\n          protocol: TCP\n' "${{ env.RPC_PORT }}")
            export SVC_RPC_PORT_BLOCK=$(printf '    - name: rpc\n      port: %s\n      protocol: TCP\n      targetPort: rpc\n' "${{ env.RPC_PORT }}")
          else
            export DEPLOY_RPC_PORT_BLOCK=""
            export SVC_RPC_PORT_BLOCK=""
          fi

          export REPLICAS="${{ env.DEPLOYMENT_REPLICAS }}"
          export REVISION_HISTORY_LIMIT="10"
          export IMAGE_PULL_POLICY="IfNotPresent"
          export IMAGE_PULL_SECRETS="${{ env.IMAGE_PULL_SECRETS }}"
          export READINESS_DELAY="${{ env.READINESS_DELAY }}"
          export READINESS_PERIOD="${{ env.READINESS_PERIOD }}"
          export LIVENESS_DELAY="${{ env.LIVENESS_DELAY }}"
          export LIVENESS_PERIOD="${{ env.LIVENESS_PERIOD }}"
          export CPU_REQUEST="${{ env.CPU_REQUEST }}"
          export MEMORY_REQUEST="${{ env.MEMORY_REQUEST }}"
          export CPU_LIMIT="${{ env.CPU_LIMIT }}"
          export MEMORY_LIMIT="${{ env.MEMORY_LIMIT }}"
          export MIN_REPLICAS="${{ env.MIN_REPLICAS }}"
          export MAX_REPLICAS="${{ env.MAX_REPLICAS }}"
          export TARGET_CPU_UTILIZATION="${{ env.TARGET_CPU_UTILIZATION }}"
          export TARGET_MEMORY_UTILIZATION="${{ env.TARGET_MEMORY_UTILIZATION }}"
          export INGRESS_PATH_PREFIX="${{ inputs.ingress-path-prefix }}"
          export INGRESS_ENTRY_POINT="${{ env.INGRESS_ENTRY_POINT }}"
          export INGRESS_TLS="${{ env.INGRESS_TLS }}"
          export INGRESS_CERT_RESOLVER="${{ env.INGRESS_CERT_RESOLVER }}"
          export INGRESS_TLS_ENTRY_POINT="${{ env.INGRESS_TLS_ENTRY_POINT }}"
          export RUN_MODE="${{ inputs.environment }}"
          export CONFIGMAP_NAME="${{ inputs.configmap-name }}"
          export CONFIG_MOUNT_PATH="${{ env.DOCKER_RUN_WORKDIR }}/resources"

          if [ -n "${{ inputs.config-yaml }}" ] && [ -f "${{ inputs.config-yaml }}" ]; then
            CONFIG_BASENAME=$(basename "${{ inputs.config-yaml }}")

            cat <<CMEOF > ${DEPLOY_DIR}/configmap.yaml
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: ${{ inputs.configmap-name }}
            namespace: ${{ env.NAMESPACE }}
          data:
            ${CONFIG_BASENAME}: |
          CMEOF
            sed 's/^/    /' "${{ inputs.config-yaml }}" >> ${DEPLOY_DIR}/configmap.yaml
            echo "ConfigMap generated"
          fi

          : ${REPLICAS:=1}
          : ${REVISION_HISTORY_LIMIT:=10}
          : ${IMAGE_PULL_POLICY:=IfNotPresent}
          : ${IMAGE_PULL_SECRETS:=ghcr.io}
          : ${READINESS_DELAY:=5}
          : ${READINESS_PERIOD:=10}
          : ${LIVENESS_DELAY:=15}
          : ${LIVENESS_PERIOD:=20}
          : ${CPU_REQUEST:=300m}
          : ${MEMORY_REQUEST:=250Mi}
          : ${CPU_LIMIT:=600m}
          : ${MEMORY_LIMIT:=500Mi}
          : ${MIN_REPLICAS:=1}
          : ${MAX_REPLICAS:=10}
          : ${TARGET_CPU_UTILIZATION:=80}
          : ${TARGET_MEMORY_UTILIZATION:=80}
          : ${RUN_MODE:=dev}
          : ${CONFIGMAP_NAME:=${APP_NAME}-config}
          : ${CONFIG_MOUNT_PATH:=/usr/local/services/resources}

          envsubst < _deploy-workflows/templates/k8s/backend/deployment.yaml > ${DEPLOY_DIR}/deployment.yaml
          echo "Deployment generated"

          envsubst < _deploy-workflows/templates/k8s/backend/service.yaml > ${DEPLOY_DIR}/service.yaml
          echo "Service generated"

          if [ "${{ env.ENABLE_HPA }}" = "true" ]; then
            envsubst < _deploy-workflows/templates/k8s/backend/hpa.yaml > ${DEPLOY_DIR}/hpa.yaml
            echo "HPA generated"
          fi

          if [ -n "${{ inputs.ingress-path-prefix }}" ]; then
            if [ "${{ env.INGRESS_TLS }}" = "true" ]; then
              envsubst < _deploy-workflows/templates/k8s/backend/ingress-tls.yaml > ${DEPLOY_DIR}/ingress.yaml
              echo "Ingress generated with TLS (certResolver=${{ env.INGRESS_CERT_RESOLVER }})"
            else
              envsubst < _deploy-workflows/templates/k8s/backend/ingress.yaml > ${DEPLOY_DIR}/ingress.yaml
              echo "Ingress generated (no TLS)"
            fi
          fi

          echo ""
          echo "Generated manifests:"
          ls -lh ${DEPLOY_DIR}/*.yaml

          echo ""
          echo "============================================="
          echo "Manifest contents:"
          echo "============================================="
          for file in ${DEPLOY_DIR}/*.yaml; do
            echo ""
            echo "--- $(basename "$file") ---"
            if [ "$(basename "$file")" = "configmap.yaml" ]; then
              sed -E 's/^(\s*(password|passwd|pwd|secret|token|key|api[_-]?key|access[_-]?key|private[_-]?key|auth|credential|dsn|connection[_-]?string|smtp[_-]?pass|ldap[_-]?pass|jdbc[_-]?pass|amqp[_-]?pass|mysql[_-]?pass|postgres[_-]?pass|redis[_-]?pass|mongo[_-]?pass)\s*:\s*)(.{2})(.*)(.{2})$/\1\2***\4/I' "$file"
            else
              cat "$file"
            fi
          done

      - name: 🚀 Apply Kubernetes Resources
        run: |
          DEPLOY_DIR="${{ inputs.binary-source-dir }}"

          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply --server-side --validate=false -f -

          if [ -f "${DEPLOY_DIR}/configmap.yaml" ]; then
            echo "Applying ConfigMap..."
            kubectl apply --server-side --validate=false -f ${DEPLOY_DIR}/configmap.yaml -n ${{ env.NAMESPACE }}
          fi

          if [ -f "${DEPLOY_DIR}/deployment.yaml" ]; then
            echo "Applying Deployment..."
            kubectl apply --server-side --validate=false -f ${DEPLOY_DIR}/deployment.yaml -n ${{ env.NAMESPACE }}
          fi

          if [ -f "${DEPLOY_DIR}/service.yaml" ]; then
            echo "Applying Service..."
            kubectl apply --server-side --validate=false -f ${DEPLOY_DIR}/service.yaml -n ${{ env.NAMESPACE }}
          fi

          if [ "${{ env.ENABLE_HPA }}" = "true" ] && [ -f "${DEPLOY_DIR}/hpa.yaml" ]; then
            echo "Applying HPA..."
            kubectl apply --server-side --validate=false -f ${DEPLOY_DIR}/hpa.yaml -n ${{ env.NAMESPACE }}
          fi

          if [ -f "${DEPLOY_DIR}/ingress.yaml" ]; then
            echo "Applying Ingress..."
            kubectl apply --server-side --validate=false -f ${DEPLOY_DIR}/ingress.yaml -n ${{ env.NAMESPACE }}
          fi

      - name: ⏳ Wait for Deployment
        run: |
          MAX_WAIT="${{ vars.K8S_HEALTH_MAX_WAIT || '120' }}"
          ELAPSED=0
          INTERVAL=10

          # 获取当前 Deployment 的 pod-template-hash，只关注新 ReplicaSet 的 Pod
          NEW_RS_HASH=$(kubectl get deployment/${{ inputs.binary-name }} -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.latestRevision}' 2>/dev/null || echo "")

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            REPLICAS=$(kubectl get deployment/${{ inputs.binary-name }} -n ${{ env.NAMESPACE }} \
              -o jsonpath='{.status.replicas}' 2>/dev/null || echo "0")
            READY_REPLICAS=$(kubectl get deployment/${{ inputs.binary-name }} -n ${{ env.NAMESPACE }} \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            UPDATED_REPLICAS=$(kubectl get deployment/${{ inputs.binary-name }} -n ${{ env.NAMESPACE }} \
              -o jsonpath='{.status.updatedReplicas}' 2>/dev/null || echo "0")

            echo "Progress: Ready=${READY_REPLICAS}/${REPLICAS}, Updated=${UPDATED_REPLICAS}/${REPLICAS}"

            if [ "$READY_REPLICAS" = "$REPLICAS" ] && [ "$UPDATED_REPLICAS" = "$REPLICAS" ] && [ "$REPLICAS" != "0" ]; then
              echo "Deployment completed successfully!"
              break
            fi

            # 只检查新 ReplicaSet 的 Pod，忽略正在终止的旧 Pod
            if [ -n "$NEW_RS_HASH" ]; then
              PROBLEM_PODS=$(kubectl get pods -n ${{ env.NAMESPACE }} -l app=${{ inputs.binary-name }},pod-template-hash=${NEW_RS_HASH} \
                -o json | jq -r '.items[] | select(
                  (.status.containerStatuses[]?.restartCount // 0) > 3 or
                  (.status.phase != "Running" and .status.phase != "Succeeded" and .status.phase != "Pending")
                ) | .metadata.name' 2>/dev/null || echo "")
            else
              PROBLEM_PODS=$(kubectl get pods -n ${{ env.NAMESPACE }} -l app=${{ inputs.binary-name }} \
                -o json | jq -r '.items[] | select(
                  (.status.containerStatuses[]?.restartCount // 0) > 3 or
                  (.status.phase != "Running" and .status.phase != "Succeeded" and .status.phase != "Pending")
                ) | .metadata.name' 2>/dev/null || echo "")
            fi

            if [ -n "$PROBLEM_PODS" ]; then
              echo "Warning: Found problematic pods in new ReplicaSet"
              for pod in $PROBLEM_PODS; do
                echo "--- Pod: $pod ---"
                kubectl logs $pod -n ${{ env.NAMESPACE }} --tail=30 2>&1 || true
              done
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "Deployment timed out ($MAX_WAIT seconds)!"
            kubectl describe deployment/${{ inputs.binary-name }} -n ${{ env.NAMESPACE }}
            kubectl get pods,rs -n ${{ env.NAMESPACE }} -l app=${{ inputs.binary-name }} -o wide
            exit 1
          fi

      - name: ✅ Verify Deployment
        run: |
          # 获取当前 Deployment 的 pod-template-hash，只验证新 Pod
          NEW_RS_HASH=$(kubectl get deployment/${{ inputs.binary-name }} -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.latestRevision}' 2>/dev/null || echo "")

          if [ -n "$NEW_RS_HASH" ]; then
            LABEL_SELECTOR="app=${{ inputs.binary-name }},pod-template-hash=${NEW_RS_HASH}"
          else
            LABEL_SELECTOR="app=${{ inputs.binary-name }}"
          fi

          READY_PODS=$(kubectl get pods -n ${{ env.NAMESPACE }} -l "${LABEL_SELECTOR}" \
            -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}' | tr ' ' '\n' | grep -c "True" || echo "0")

          TOTAL_PODS=$(kubectl get pods -n ${{ env.NAMESPACE }} -l "${LABEL_SELECTOR}" \
            --no-headers 2>/dev/null | wc -l)

          echo "Ready pods: ${READY_PODS}/${TOTAL_PODS} (new ReplicaSet only)"

          if [ "$READY_PODS" -eq "0" ]; then
            echo "Deployment verification failed: no pods are ready"
            kubectl describe pods -n ${{ env.NAMESPACE }} -l "${LABEL_SELECTOR}"
            exit 1
          fi

          echo "Deployment verified successfully!"

  notify:
    name: 🔔 Send Deployment Notification
    needs: [deploy]
    if: always() && inputs.notification-provider != 'none'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Deploy Workflows (for scripts)
        uses: actions/checkout@v6
        with:
          repository: kamalyes/deploy-pipeline
          ref: master
          path: _deploy-workflows

      - name: 📤 Send Notification
        run: |
          export NOTIFICATION_PROVIDER="${{ inputs.notification-provider }}"
          export NOTIFICATION_TYPE="deployment"
          export STATUS="${{ needs.deploy.result }}"
          export ENVIRONMENT="${{ inputs.environment }}"
          export BINARY_NAME="${{ inputs.binary-name }}"
          export VERSION="${{ needs.deploy.outputs.image-name || inputs.image-name }}"
          export GIT_COMMIT="${{ github.sha }}"
          export GIT_BRANCH="${{ github.ref_name }}"
          export OPERATOR="${{ github.actor }}"
          export WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          export FEISHU_WEBHOOK_URL="${{ secrets.FEISHU_WEBHOOK_URL }}"
          export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          export GITHUB_ACTOR="${{ github.actor }}"
          export DEPLOYMENT_TARGET="Kubernetes"
          export NAMESPACE="${{ inputs.namespace || vars.K8S_NAMESPACE || 'business' }}"
          export HTTP_PORT="${{ inputs.http-port || vars.HTTP_PORT || '8182' }}"
          export RPC_PORT="${{ inputs.rpc-port || vars.RPC_PORT || '9181' }}"
          export DEPLOYMENT_REPLICAS="${{ inputs.deployment-replicas || vars.K8S_DEPLOYMENT_REPLICAS || '1' }}"

          if [ "$STATUS" = "failure" ]; then
            export ERROR_MESSAGE="Kubernetes deployment failed, check logs for details"
          fi

          bash _deploy-workflows/scripts/notify.sh
