name: Deploy to Kubernetes

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment (dev/test/prod)'
        required: true
        type: string
      image-name:
        description: 'Complete Docker image name with tag'
        required: true
        type: string
      binary-source-dir:
        description: 'Binary source directory (also used as deployments output dir)'
        required: true
        type: string
      binary-name:
        description: 'Binary/Service name'
        required: true
        type: string
      http-port:
        description: 'HTTP port'
        required: true
        type: string
      rpc-port:
        description: 'RPC port'
        required: true
        type: string
      pprof-port:
        description: 'Pprof port'
        required: true
        type: string
      config-yaml:
        description: 'Configuration YAML file path'
        required: false
        type: string
        default: ''
      configmap-name:
        description: 'ConfigMap name'
        required: false
        type: string
        default: ''
      docker-workdir:
        description: 'Docker working directory'
        required: false
        type: string
        default: '/usr/local/services'
      image-pull-secrets:
        description: 'Image pull secrets name'
        required: false
        type: string
        default: 'hitgameai.ghcr.io'
      readiness-delay-seconds:
        description: 'Readiness probe initial delay seconds'
        required: false
        type: string
        default: '5'
      readiness-period-seconds:
        description: 'Readiness probe period seconds'
        required: false
        type: string
        default: '10'
      liveness-delay-seconds:
        description: 'Liveness probe initial delay seconds'
        required: false
        type: string
        default: '15'
      liveness-period-seconds:
        description: 'Liveness probe period seconds'
        required: false
        type: string
        default: '20'
      cpu-request:
        description: 'CPU request'
        required: false
        type: string
        default: '300m'
      memory-request:
        description: 'Memory request'
        required: false
        type: string
        default: '250Mi'
      cpu-limit:
        description: 'CPU limit'
        required: false
        type: string
        default: '600m'
      memory-limit:
        description: 'Memory limit'
        required: false
        type: string
        default: '500Mi'
      min-replicas:
        description: 'Minimum replicas count'
        required: false
        type: string
        default: '1'
      max-replicas:
        description: 'Maximum replicas count'
        required: false
        type: string
        default: '10'
      deployment-replicas:
        description: 'Deployment replicas count'
        required: false
        type: string
        default: '1'
      target-cpu-utilization:
        description: 'Target CPU utilization percentage'
        required: false
        type: string
        default: '80'
      target-memory-utilization:
        description: 'Target memory utilization percentage'
        required: false
        type: string
        default: '80'
      scale-up-percent:
        description: 'Scale up maximum percentage'
        required: false
        type: string
        default: '100'
      scale-down-percent:
        description: 'Scale down maximum percentage'
        required: false
        type: string
        default: '50'
      scale-down-stabilization-seconds:
        description: 'Scale down stabilization window in seconds'
        required: false
        type: string
        default: '300'
      enable-hpa:
        description: 'Enable HPA (Horizontal Pod Autoscaler)'
        required: false
        type: string
        default: 'true'
      ingress-path-prefix:
        description: 'Ingress path prefix (empty to skip Ingress)'
        required: false
        type: string
        default: ''
      ingress-entry-point:
        description: 'Ingress entry point'
        required: false
        type: string
        default: 'web'
      notification-provider:
        description: 'Notification provider (none/feishu/telegram/all)'
        required: false
        type: string
        default: 'none'

jobs:
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      KUBECONFIG: ${{ secrets.KUBECONFIG }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Kubernetes Context
        uses: Azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ env.KUBECONFIG }}

      - name: Generate K8s Manifests
        run: |
          echo "Generating Kubernetes manifests for: ${{ inputs.binary-name }}"
          echo "  Namespace: ${{ inputs.environment }}"
          echo "  Image: ${{ inputs.image-name }}"
          echo "  HTTP: ${{ inputs.http-port }}, RPC: ${{ inputs.rpc-port }}, PProf: ${{ inputs.pprof-port }}"

          DEPLOY_DIR="${{ inputs.binary-source-dir }}"
          mkdir -p "${DEPLOY_DIR}"

          # ========== ConfigMap ==========
          if [ -n "${{ inputs.config-yaml }}" ] && [ -f "${{ inputs.config-yaml }}" ]; then
            CONFIG_BASENAME=$(basename "${{ inputs.config-yaml }}")
            CONFIG_MOUNT_PATH="${{ inputs.docker-workdir }}/resources"

            cat <<CMEOF > ${DEPLOY_DIR}/configmap.yaml
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: ${{ inputs.configmap-name }}
            namespace: ${{ inputs.environment }}
          data:
            ${CONFIG_BASENAME}: |
          CMEOF
            sed 's/^/    /' "${{ inputs.config-yaml }}" >> ${DEPLOY_DIR}/configmap.yaml
            echo "ConfigMap generated"
          fi

          # ========== Deployment ==========
          # Compute HPA scale pod counts
          MIN_REP=${{ inputs.min-replicas }}
          MAX_REP=${{ inputs.max-replicas }}
          SCALE_UP_PODS=$(( (MAX_REP - MIN_REP) / 2 ))
          [ $SCALE_UP_PODS -lt 1 ] && SCALE_UP_PODS=1
          SCALE_DOWN_PODS=$(( (MAX_REP - MIN_REP) / 4 ))
          [ $SCALE_DOWN_PODS -lt 1 ] && SCALE_DOWN_PODS=1

          # Build volumeMounts and volumes for ConfigMap if present
          VOLUME_MOUNTS=""
          VOLUMES=""
          ENV_CONFIG=""
          if [ -n "${{ inputs.config-yaml }}" ] && [ -f "${{ inputs.config-yaml }}" ]; then
            CONFIG_BASENAME=$(basename "${{ inputs.config-yaml }}")
            CONFIG_MOUNT_PATH="${{ inputs.docker-workdir }}/resources"
            VOLUME_MOUNTS="
        volumeMounts:
        - name: config-volume
          mountPath: ${CONFIG_MOUNT_PATH}
          readOnly: true"
            VOLUMES="
      volumes:
      - name: config-volume
        configMap:
          name: ${{ inputs.configmap-name }}"
            ENV_CONFIG="
        env:
        - name: CONFIG_FILE_PATH
          value: ${CONFIG_MOUNT_PATH}/${CONFIG_BASENAME}
        - name: APP_ENV
          value: ${{ inputs.environment }}"
          fi

          cat << DEPEOF > ${DEPLOY_DIR}/deployment.yaml
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${{ inputs.binary-name }}
            namespace: ${{ inputs.environment }}
            labels:
              app: ${{ inputs.binary-name }}
          spec:
            replicas: ${{ inputs.deployment-replicas }}
            revisionHistoryLimit: 10
            selector:
              matchLabels:
                app: ${{ inputs.binary-name }}
            template:
              metadata:
                labels:
                  app: ${{ inputs.binary-name }}
              spec:
                containers:
                - name: ${{ inputs.binary-name }}
                  image: ${{ inputs.image-name }}
                  imagePullPolicy: IfNotPresent
                  ${ENV_CONFIG}
                  ${VOLUME_MOUNTS}
                  lifecycle:
                    preStop:
                      exec:
                        command: ["sh", "-c", "sleep 5"]
                  ports:
                  - name: http
                    containerPort: ${{ inputs.http-port }}
                    protocol: TCP
                  - name: rpc
                    containerPort: ${{ inputs.rpc-port }}
                    protocol: TCP
                  - name: pprof
                    containerPort: ${{ inputs.pprof-port }}
                    protocol: TCP
                  readinessProbe:
                    tcpSocket:
                      port: http
                    initialDelaySeconds: ${{ inputs.readiness-delay-seconds }}
                    periodSeconds: ${{ inputs.readiness-period-seconds }}
                  livenessProbe:
                    tcpSocket:
                      port: http
                    initialDelaySeconds: ${{ inputs.liveness-delay-seconds }}
                    periodSeconds: ${{ inputs.liveness-period-seconds }}
                  resources:
                    requests:
                      cpu: ${{ inputs.cpu-request }}
                      memory: ${{ inputs.memory-request }}
                    limits:
                      cpu: ${{ inputs.cpu-limit }}
                      memory: ${{ inputs.memory-limit }}
                ${VOLUMES}
                imagePullSecrets:
                - name: ${{ inputs.image-pull-secrets }}
          DEPEOF
          echo "Deployment generated"

          # ========== Service ==========
          cat << SVCEOF > ${DEPLOY_DIR}/service.yaml
          apiVersion: v1
          kind: Service
          metadata:
            name: ${{ inputs.binary-name }}
            namespace: ${{ inputs.environment }}
          spec:
            ports:
              - name: http
                port: ${{ inputs.http-port }}
                protocol: TCP
                targetPort: http
              - name: rpc
                port: ${{ inputs.rpc-port }}
                protocol: TCP
                targetPort: rpc
              - name: pprof
                port: ${{ inputs.pprof-port }}
                protocol: TCP
                targetPort: pprof
            selector:
              app: ${{ inputs.binary-name }}
          SVCEOF
          echo "Service generated"

          # ========== HPA ==========
          if [ "${{ inputs.enable-hpa }}" = "true" ]; then
            cat << HPAEOF > ${DEPLOY_DIR}/hpa.yaml
          apiVersion: autoscaling/v2
          kind: HorizontalPodAutoscaler
          metadata:
            name: ${{ inputs.binary-name }}-hpa
            namespace: ${{ inputs.environment }}
            labels:
              app: ${{ inputs.binary-name }}-hpa
          spec:
            scaleTargetRef:
              apiVersion: apps/v1
              kind: Deployment
              name: ${{ inputs.binary-name }}
            minReplicas: ${{ inputs.min-replicas }}
            maxReplicas: ${{ inputs.max-replicas }}
            metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: ${{ inputs.target-cpu-utilization }}
            - type: Resource
              resource:
                name: memory
                target:
                  type: Utilization
                  averageUtilization: ${{ inputs.target-memory-utilization }}
            behavior:
              scaleDown:
                stabilizationWindowSeconds: ${{ inputs.scale-down-stabilization-seconds }}
                policies:
                - type: Percent
                  value: ${{ inputs.scale-down-percent }}
                  periodSeconds: 60
                - type: Pods
                  value: ${SCALE_DOWN_PODS}
                  periodSeconds: 60
                selectPolicy: Min
              scaleUp:
                stabilizationWindowSeconds: 0
                policies:
                - type: Percent
                  value: ${{ inputs.scale-up-percent }}
                  periodSeconds: 60
                - type: Pods
                  value: ${SCALE_UP_PODS}
                  periodSeconds: 60
                selectPolicy: Max
          HPAEOF
          echo "HPA generated"
          fi

          # ========== Ingress (Traefik IngressRoute) ==========
          if [ -n "${{ inputs.ingress-path-prefix }}" ]; then
            cat << INGEOF > ${DEPLOY_DIR}/ingress.yaml
          apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: ${{ inputs.binary-name }}
            namespace: ${{ inputs.environment }}
          spec:
            stripPrefix:
              prefixes:
                - ${{ inputs.ingress-path-prefix }}
          ---
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: ${{ inputs.binary-name }}
            namespace: ${{ inputs.environment }}
          spec:
            entryPoints:
              - ${{ inputs.ingress-entry-point }}
            routes:
            - match: PathPrefix(\`${{ inputs.ingress-path-prefix }}\`)
              kind: Rule
              services:
              - name: ${{ inputs.binary-name }}
                port: ${{ inputs.http-port }}
              middlewares:
              - name: ${{ inputs.binary-name }}
                namespace: ${{ inputs.environment }}
          INGEOF
          echo "Ingress generated"
          fi

          echo ""
          echo "Generated manifests:"
          ls -lh ${DEPLOY_DIR}/*.yaml

      - name: Apply Kubernetes Resources
        run: |
          DEPLOY_DIR="${{ inputs.binary-source-dir }}"

          # Create namespace if not exists
          kubectl create namespace ${{ inputs.environment }} --dry-run=client -o yaml | kubectl apply -f -

          # Apply ConfigMap
          if [ -f "${DEPLOY_DIR}/configmap.yaml" ]; then
            echo "Applying ConfigMap..."
            kubectl apply -f ${DEPLOY_DIR}/configmap.yaml -n ${{ inputs.environment }}
          fi

          # Apply Deployment
          if [ -f "${DEPLOY_DIR}/deployment.yaml" ]; then
            echo "Applying Deployment..."
            kubectl apply -f ${DEPLOY_DIR}/deployment.yaml -n ${{ inputs.environment }}
          fi

          # Apply Service
          if [ -f "${DEPLOY_DIR}/service.yaml" ]; then
            echo "Applying Service..."
            kubectl apply -f ${DEPLOY_DIR}/service.yaml -n ${{ inputs.environment }}
          fi

          # Apply HPA
          if [ "${{ inputs.enable-hpa }}" = "true" ] && [ -f "${DEPLOY_DIR}/hpa.yaml" ]; then
            echo "Applying HPA..."
            kubectl apply -f ${DEPLOY_DIR}/hpa.yaml -n ${{ inputs.environment }}
          fi

          # Apply Ingress
          if [ -f "${DEPLOY_DIR}/ingress.yaml" ]; then
            echo "Applying Ingress..."
            kubectl apply -f ${DEPLOY_DIR}/ingress.yaml -n ${{ inputs.environment }}
          fi

      - name: Wait for Deployment
        run: |
          MAX_WAIT=300
          ELAPSED=0
          INTERVAL=10

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            REPLICAS=$(kubectl get deployment/${{ inputs.binary-name }} -n ${{ inputs.environment }} \
              -o jsonpath='{.status.replicas}' 2>/dev/null || echo "0")
            READY_REPLICAS=$(kubectl get deployment/${{ inputs.binary-name }} -n ${{ inputs.environment }} \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            UPDATED_REPLICAS=$(kubectl get deployment/${{ inputs.binary-name }} -n ${{ inputs.environment }} \
              -o jsonpath='{.status.updatedReplicas}' 2>/dev/null || echo "0")

            echo "Progress: Ready=${READY_REPLICAS}/${REPLICAS}, Updated=${UPDATED_REPLICAS}/${REPLICAS}"

            if [ "$READY_REPLICAS" = "$REPLICAS" ] && [ "$UPDATED_REPLICAS" = "$REPLICAS" ] && [ "$REPLICAS" != "0" ]; then
              echo "Deployment completed successfully!"
              break
            fi

            # Check for problematic pods
            PROBLEM_PODS=$(kubectl get pods -n ${{ inputs.environment }} -l app=${{ inputs.binary-name }} \
              -o json | jq -r '.items[] | select(
                (.status.containerStatuses[0].restartCount > 3) or
                (.status.phase != "Running" and .status.phase != "Succeeded")
              ) | .metadata.name' 2>/dev/null || echo "")

            if [ -n "$PROBLEM_PODS" ]; then
              echo "Warning: Found problematic pods"
              for pod in $PROBLEM_PODS; do
                echo "--- Pod: $pod ---"
                kubectl logs $pod -n ${{ inputs.environment }} --tail=30 2>&1 || true
              done
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "Deployment timed out ($MAX_WAIT seconds)!"
            kubectl describe deployment/${{ inputs.binary-name }} -n ${{ inputs.environment }}
            kubectl get pods,rs -n ${{ inputs.environment }} -l app=${{ inputs.binary-name }} -o wide
            exit 1
          fi

      - name: Verify Deployment
        run: |
          READY_PODS=$(kubectl get pods -n ${{ inputs.environment }} -l app=${{ inputs.binary-name }} \
            -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}' | tr ' ' '\n' | grep -c "True" || echo "0")

          TOTAL_PODS=$(kubectl get pods -n ${{ inputs.environment }} -l app=${{ inputs.binary-name }} \
            --no-headers | wc -l)

          echo "Ready pods: ${READY_PODS}/${TOTAL_PODS}"

          if [ "$READY_PODS" -eq "0" ]; then
            echo "Deployment verification failed: no pods are ready"
            kubectl describe pods -n ${{ inputs.environment }} -l app=${{ inputs.binary-name }}
            exit 1
          fi

          echo "Deployment verified successfully!"

  notify:
    name: Send Deployment Notification
    needs: [deploy]
    if: always() && inputs.notification-provider != 'none'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Send Notification
        run: |
          export NOTIFICATION_PROVIDER="${{ inputs.notification-provider }}"
          export NOTIFICATION_TYPE="deployment"
          export STATUS="${{ needs.deploy.result }}"
          export ENVIRONMENT="${{ inputs.environment }}"
          export BINARY_NAME="${{ inputs.binary-name }}"
          export VERSION="${{ inputs.image-name }}"
          export GIT_COMMIT="${{ github.sha }}"
          export GIT_BRANCH="${{ github.ref_name }}"
          export OPERATOR="${{ github.actor }}"
          export WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          export FEISHU_WEBHOOK_URL="${{ secrets.FEISHU_WEBHOOK_URL }}"
          export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          export GITHUB_ACTOR="${{ github.actor }}"
          export DEPLOYMENT_TARGET="Kubernetes"
          export NAMESPACE="${{ inputs.environment }}"
          export HTTP_PORT="${{ inputs.http-port }}"
          export RPC_PORT="${{ inputs.rpc-port }}"
          export DEPLOYMENT_REPLICAS="${{ inputs.deployment-replicas }}"

          if [ "$STATUS" = "failure" ]; then
            export ERROR_MESSAGE="Kubernetes deployment failed, check logs for details"
          fi

          bash scripts/notify.sh
