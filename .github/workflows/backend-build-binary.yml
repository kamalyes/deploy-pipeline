name: 🚀 Build Binary

on:
  workflow_call:
    inputs:
      # ============================================
      # 动态值（每次调用不同，必须传入）
      # ============================================
      binary-name:
        description: 'Binary name'
        required: true
        type: string
      binary-source-dir:
        description: 'Binary source directory'
        required: true
        type: string
      binary-output:
        description: 'Binary output path'
        required: true
        type: string
      version:
        description: 'Build version'
        required: true
        type: string
      build-time:
        description: 'Build time'
        required: true
        type: string
      git-commit:
        description: 'Git commit hash'
        required: true
        type: string
      # ============================================
      # 可覆盖的静态配置（有默认值，优先读 vars）
      # ============================================
      go-version:
        description: 'Go version (overrides vars.GO_VERSION)'
        required: false
        type: string
        default: ''
      goproxy:
        description: 'Go module proxy (overrides vars.GOPROXY)'
        required: false
        type: string
        default: ''
      goprivate:
        description: 'Go private modules (overrides vars.GOPRIVATE)'
        required: false
        type: string
        default: ''
      go-auth-method:
        description: 'Go private module auth method: app-token | ssh | none'
        required: false
        type: string
        default: ''
      upx-compress:
        description: 'Enable UPX compression (overrides vars.UPX_COMPRESS)'
        required: false
        type: string
        default: ''
      retention-days:
        description: 'Artifact retention days (smaller value reduces storage usage)'
        required: false
        type: string
        default: '7'
      os:
        description: 'Target OS'
        required: false
        type: string
        default: 'linux'
      arch:
        description: 'Target architecture'
        required: false
        type: string
        default: 'amd64'
      build-script:
        description: 'Path to build script (relative to repo root)'
        required: false
        type: string
        default: 'scripts/backend/build-linux.sh'
      binary-build-dir:
        description: 'Build directory containing main package (e.g. ./bootstrap), overrides default repo root'
        required: false
        type: string
        default: ''
    secrets:
      APP_ID:
        description: 'GitHub App ID (for app-token auth)'
        required: false
      APP_PRIVATE_KEY:
        description: 'GitHub App Private Key (for app-token auth)'
        required: false
      GIT_SSH_PRIVATE_KEY:
        description: 'Git SSH 私钥内容 (for ssh auth, legacy)'
        required: false

jobs:
  build-binary:
    name: 🚀 Build Go Binary
    runs-on: ubuntu-latest
    env:
      # 优先级: input > vars > 硬编码默认值
      GO_VERSION: ${{ inputs.go-version || vars.GO_VERSION || '1.25.1' }}
      GOPROXY: ${{ inputs.goproxy || vars.GOPROXY || 'https://goproxy.cn,direct' }}
      GOPRIVATE: ${{ inputs.goprivate || vars.GOPRIVATE || '' }}
      GO_AUTH_METHOD: ${{ inputs.go-auth-method || vars.GO_AUTH_METHOD || 'ssh' }}
      UPX_COMPRESS: ${{ inputs.upx-compress || vars.UPX_COMPRESS || 'false' }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6

      - name: 🖥️ Print Runner Info
        uses: kamalyes/deploy-pipeline/.github/actions/print-runner-info@master

      - name: 📥 Checkout Deploy Workflows (for scripts)
        uses: actions/checkout@v6
        with:
          repository: kamalyes/deploy-pipeline
          ref: master
          path: _deploy-workflows

      - name: 🗄️ Cache UPX
        if: env.UPX_COMPRESS == 'true'
        uses: actions/cache@v4
        with:
          path: |
            /usr/bin/upx
            /usr/bin/upx-ucl
          key: upx-${{ runner.os }}-ucl
          restore-keys: |
            upx-${{ runner.os }}-

      # ============================================
      # Auth Method: app-token
      # 使用 GitHub App 生成临时 Token 拉取私有模块
      # 条件：GO_AUTH_METHOD == 'app-token'（不依赖 GOPRIVATE 是否为空）
      # ============================================
      - name: 🔑 Generate GitHub App Token
        if: env.GO_AUTH_METHOD == 'app-token'
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: ⚙️ Configure Git for App Token Auth
        if: env.GO_AUTH_METHOD == 'app-token'
        run: |
          git config --global url."https://x-access-token:${{ steps.app_token.outputs.token }}@github.com/".insteadOf "https://github.com/"
          if [ -n "${GOPRIVATE}" ]; then
            echo "GOPRIVATE=${GOPRIVATE}" >> "$GITHUB_ENV"
          fi

      # ============================================
      # Auth Method: ssh (legacy)
      # 使用 SSH 私钥拉取私有模块
      # 条件：GO_AUTH_METHOD == 'ssh'（不依赖 GOPRIVATE 是否为空）
      # ============================================
      - name: 🔑 Setup SSH Key for Private Modules
        if: env.GO_AUTH_METHOD == 'ssh'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: ⚙️ Configure Git for SSH Auth
        if: env.GO_AUTH_METHOD == 'ssh'
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          if [ -n "${GOPRIVATE}" ]; then
            echo "GOPRIVATE=${GOPRIVATE}" >> "$GITHUB_ENV"
          fi

      - name: 🛠️ Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
          cache: true
          cache-dependency-path: go.sum

      - name: 📦 Download Dependencies
        run: |
          export GOPROXY="${{ env.GOPROXY }}"
          if [ -n "${{ env.GOPRIVATE }}" ]; then
            export GOPRIVATE="${{ env.GOPRIVATE }}"
          fi
          go mod download

      - name: 🔨 Build Binary
        run: |
          if [ -f "${{ inputs.build-script }}" ]; then
            BUILD_SCRIPT="${{ inputs.build-script }}"
          else
            BUILD_SCRIPT="_deploy-workflows/scripts/backend/build-linux.sh"
          fi
          chmod +x "${BUILD_SCRIPT}"

          ./${BUILD_SCRIPT} \
            --version "${{ inputs.version }}" \
            --build-time "${{ inputs.build-time }}" \
            --git-commit "${{ inputs.git-commit }}" \
            --binary-name "${{ inputs.binary-name }}" \
            --output-dir "${{ inputs.binary-source-dir }}" \
            --os "${{ inputs.os }}" \
            --arch "${{ inputs.arch }}" \
            --upx-compress "${{ env.UPX_COMPRESS }}" \
            --build-dir "${{ inputs.binary-build-dir }}"

          echo "Build completed: ${{ inputs.binary-name }}"
          ls -lh "${{ inputs.binary-source-dir }}"

      - name: 📤 Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.binary-name }}-binary
          path: ${{ inputs.binary-output }}
          retention-days: ${{ inputs.retention-days }}