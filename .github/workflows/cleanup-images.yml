name: 🗑️ Cleanup Old Images

on:
  workflow_call:
    inputs:
      project-owner:
        description: 'GitHub organization/user that owns the package'
        required: true
        type: string
      image-name:
        description: 'Docker image name (package name)'
        required: true
        type: string
      keep-count:
        description: 'Number of image versions to keep'
        required: false
        type: string
        default: '5'

jobs:
  cleanup:
    name: 🗑️ Cleanup Old GHCR Images
    runs-on: ubuntu-latest
    steps:
      - name: 🗑️ Cleanup Old Images from GHCR
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          KEEP_COUNT: ${{ inputs.keep-count }}
        run: |
          echo "Cleaning old images: ${{ inputs.project-owner }}/${{ inputs.image-name }}"
          echo "Keeping latest ${{ inputs.keep-count }} versions"

          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

          OLD_IDS=$(gh api \
            -H "Accept: application/vnd.github.v3+json" \
            /users/${{ inputs.project-owner }}/packages/container/${{ inputs.image-name }}/versions \
            --jq ".[${{ inputs.keep-count }}:] | .[] | .id" 2>/dev/null || echo "")

          if [ -z "$OLD_IDS" ]; then
            echo "No old images to clean (keeping latest ${{ inputs.keep-count }} versions)"
          else
            DELETED_COUNT=0
            FAILED_COUNT=0

            for ID in $OLD_IDS; do
              echo "  Deleting version ID: $ID..."
              if gh api \
                --method DELETE \
                -H "Accept: application/vnd.github.v3+json" \
                /users/${{ inputs.project-owner }}/packages/container/${{ inputs.image-name }}/versions/$ID \
                2>/dev/null; then
                echo "  Deleted successfully"
                DELETED_COUNT=$((DELETED_COUNT + 1))
              else
                echo "  Delete failed, may already be removed"
                FAILED_COUNT=$((FAILED_COUNT + 1))
              fi
            done

            echo ""
            echo "Cleanup summary:"
            echo "  - Successfully deleted: ${DELETED_COUNT} versions"
            echo "  - Failed to delete: ${FAILED_COUNT} versions"
          fi