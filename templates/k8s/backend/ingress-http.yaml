# ============================================
# 后端服务 HTTP IngressRoute 模板 (Traefik)
# 用于 HTTP -> HTTPS 重定向
# ============================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ${APP_NAME}-http
  namespace: ${NAMESPACE}
spec:
  entryPoints:
    - web
  routes:
  - match: ${INGRESS_MATCH_RULE}
    kind: Rule
    services:
    - name: ${APP_NAME}
      port: ${HTTP_PORT}
    ${INGRESS_REDIRECT_MIDDLEWARE}