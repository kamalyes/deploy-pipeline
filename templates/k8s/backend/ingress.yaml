# ============================================
# 后端服务 IngressRoute 模板 (Traefik)
# 支持 Host 匹配模式，TLS 作为可选配置
# ============================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ${APP_NAME}
  namespace: ${NAMESPACE}
spec:
  entryPoints:
    - ${INGRESS_ENTRY_POINT}
  routes:
${INGRESS_WS_ROUTE_BLOCK}
  - match: ${INGRESS_MATCH_RULE}
    kind: Rule
    services:
    - name: ${APP_NAME}
      port: ${INGRESS_PORT}
    ${MIDDLEWARES_BLOCK}
  ${TLS_BLOCK}
