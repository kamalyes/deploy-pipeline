# ============================================
# 后端服务 IngressRoute 模板 (Traefik)
# ============================================
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ${APP_NAME}
  namespace: ${NAMESPACE}
spec:
  stripPrefix:
    prefixes:
      - ${INGRESS_PATH_PREFIX}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ${APP_NAME}
  namespace: ${NAMESPACE}
spec:
  entryPoints:
    - ${INGRESS_ENTRY_POINT}
  routes:
  - match: PathPrefix(\`${INGRESS_PATH_PREFIX}\`)
    kind: Rule
    services:
    - name: ${APP_NAME}
      port: ${HTTP_PORT}
    middlewares:
    - name: ${APP_NAME}
      namespace: ${NAMESPACE}