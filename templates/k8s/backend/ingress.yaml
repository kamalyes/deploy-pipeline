# ============================================
# 后端服务 IngressRoute 模板 (Traefik)
# ============================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ${APP_NAME}
  namespace: ${NAMESPACE}
spec:
  entryPoints:
    - ${INGRESS_ENTRY_POINT}
  routes:
  - match: ${INGRESS_MATCH_RULE}
    kind: Rule
    services:
    - name: ${APP_NAME}
      port: ${HTTP_PORT}
    ${MIDDLEWARES_BLOCK}
