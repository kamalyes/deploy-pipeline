# ============================================
# 后端服务 Deployment/StatefulSet/DaemonSet 模板
# 使用方式: envsubst < templates/k8s/backend/deployment.yaml > output.yaml
# ============================================
apiVersion: apps/v1
kind: ${KIND}
metadata:
  name: ${APP_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: ${APP_NAME}
    tier: backend
spec:
  replicas: ${REPLICAS}
  revisionHistoryLimit: ${REVISION_HISTORY_LIMIT}
  selector:
    matchLabels:
      app: ${APP_NAME}
  template:
    metadata:
      labels:
        app: ${APP_NAME}
        tier: backend
    spec:
      containers:
      - name: ${APP_NAME}
        image: ${IMAGE_NAME}
        imagePullPolicy: ${IMAGE_PULL_POLICY}
        env:
        - name: APP_ENV
          value: "${RUN_MODE}"
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]
        ports:
${DEPLOY_HTTP_PORT_BLOCK}
${DEPLOY_RPC_PORT_BLOCK}
${DEPLOY_WS_PORT_BLOCK}
${DEPLOY_PPROF_PORT_BLOCK}
${READINESS_PROBE_BLOCK}
${LIVENESS_PROBE_BLOCK}
        resources:
          requests:
            cpu: ${CPU_REQUEST}
            memory: ${MEMORY_REQUEST}
          limits:
            cpu: ${CPU_LIMIT}
            memory: ${MEMORY_LIMIT}
        volumeMounts:
        - name: config
          mountPath: ${CONFIG_MOUNT_PATH}
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: ${CONFIGMAP_NAME}
          optional: true
      imagePullSecrets:
      - name: ${IMAGE_PULL_SECRETS}