# ============================================
# 后端服务 Service 模板
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: ${APP_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: ${APP_NAME}
    tier: backend
spec:
  ports:
    - name: http
      port: ${HTTP_PORT}
      protocol: TCP
      targetPort: http
${SVC_RPC_PORT_BLOCK}
    - name: pprof
      port: ${PPROF_PORT}
      protocol: TCP
      targetPort: pprof
  selector:
    app: ${APP_NAME}