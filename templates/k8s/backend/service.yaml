# ============================================
# 后端服务 Service 模板（支持 ClusterIP/NodePort/LoadBalancer）
# ============================================
apiVersion: v1
kind: ${SERVICE_KIND}
metadata:
  name: ${APP_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: ${APP_NAME}
    tier: backend
spec:
  type: ${SERVICE_TYPE}
  ports:
${SVC_HTTP_PORT_BLOCK}
${SVC_RPC_PORT_BLOCK}
${SVC_WS_PORT_BLOCK}
${SVC_PPROF_PORT_BLOCK}
  selector:
    app: ${APP_NAME}