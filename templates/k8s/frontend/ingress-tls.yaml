# ============================================
# 前端应用 IngressRoute 模板 (Traefik)
# Host 匹配模式 — 无 PathPrefix，无需 StripPrefix
# 启用 TLS（Traefik ACME certResolver 自动签发证书）
# ============================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ${APP_NAME}
  namespace: ${NAMESPACE}
spec:
  entryPoints:
    - ${INGRESS_TLS_ENTRY_POINT}
  routes:
  - match: ${INGRESS_MATCH_RULE}
    kind: Rule
    services:
    - name: ${APP_NAME}
      port: ${HTTP_PORT}
  tls:
    certResolver: ${INGRESS_CERT_RESOLVER}
