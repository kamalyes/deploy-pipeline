# ============================================
# 前端应用 IngressRoute 模板 (Traefik)
# Host + PathPrefix 模式 — 需要 StripPrefix Middleware
# 无 TLS
# ============================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ${APP_NAME}
  namespace: ${NAMESPACE}
spec:
  entryPoints:
    - ${INGRESS_ENTRY_POINT}
  routes:
  - match: ${INGRESS_MATCH_RULE}
    kind: Rule
    services:
    - name: ${APP_NAME}
      port: ${HTTP_PORT}
    middlewares:
    - name: ${INGRESS_STRIP_NAME}
      namespace: ${NAMESPACE}
