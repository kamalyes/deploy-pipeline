# ============================================
# 前端应用 Service 模板
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: ${APP_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: ${APP_NAME}
    tier: frontend
spec:
  ports:
    - name: http
      port: ${HTTP_PORT}
      protocol: TCP
      targetPort: http
  selector:
    app: ${APP_NAME}